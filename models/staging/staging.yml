version: 2

models:
  - name: stg_trade_blotter_raw
    description: >
      Raw ingestion layer for trade_blotter.csv. Handles type casting and
      data quality issues (invalid dates, numeric overflow, malformed timestamps)
      before any downstream model consumes the data.
    columns:
      - name: trade_ref
        tests: 
          - not_null

      - name: trade_date
        tests: 
          - not_null

      - name: ingested_at
        tests: 
          - not_null


  - name: stg_daily_nop_snapshot
    description: "Cleaned and typed version of daily_nop_snapshot.csv."
    columns:
      - name: snapshot_date
        tests: 
          - not_null

      - name: currency
        tests: 
          - not_null

      - name: closing_position_usd
        tests: 
          - not_null
